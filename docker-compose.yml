services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexera-group-client:latest
    ports:
      - "${HOST_PORT:-8080}:${PORT:-80}"
    environment:
      PORT: ${PORT:-80}
      API_UPSTREAM: ${API_UPSTREAM:-https://api.nexeragroup.rw}
    restart: unless-stopped
