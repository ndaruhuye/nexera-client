name: Nexera Client Staging CI/CD

on:
  pull_request:
    branches:
      - staging

  push:
    branches:
      - staging

  workflow_dispatch:

concurrency:
  group: nexera-client-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  # ===========================================================================
  # BUILD
  # ===========================================================================

  build:
    name: Build staging client
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image.outputs.name }}
      image-tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate image information
        id: image
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="staging-sha-${GITHUB_SHA}"

          echo "name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

          echo "Image: ${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build staging Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile

          # Pull requests only verify that the image builds.
          # Pushes to staging publish the image to GHCR.
          push: ${{ github.event_name != 'pull_request' }}

          build-args: |
            BUILD_SCRIPT=build:staging

          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:staging-latest

          cache-from: type=gha,scope=nexera-client-staging
          cache-to: type=gha,mode=max,scope=nexera-client-staging

  # ===========================================================================
  # DEPLOY
  # ===========================================================================

  deploy:
    name: Deploy staging client

    needs:
      - build

    # Pull requests build but do not deploy.
    # Manual runs must also run from the staging branch.
    if: >
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/staging'

    runs-on: ubuntu-latest

    environment:
      name: staging
      url: https://staging.nexeragroup.rw

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "${HOME}/.ssh"

          printf '%s\n' "${SSH_PRIVATE_KEY}" \
            > "${HOME}/.ssh/id_ed25519"

          chmod 600 "${HOME}/.ssh/id_ed25519"

          printf '%s\n' "${SSH_KNOWN_HOSTS}" \
            > "${HOME}/.ssh/known_hosts"

          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Verify staging deployment directory
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.STAGING_HOST }}
          SERVER_USER: ${{ secrets.STAGING_USER }}
          SERVER_PORT: ${{ vars.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ vars.STAGING_CLIENT_DEPLOY_PATH }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/nexera-group-client-staging}"

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "test -d '${DEPLOY_PATH}' &&
             test -w '${DEPLOY_PATH}'"

      - name: Log server in to GHCR
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.STAGING_HOST }}
          SERVER_USER: ${{ secrets.STAGING_USER }}
          SERVER_PORT: ${{ vars.STAGING_SSH_PORT }}
          GHCR_USERNAME: ${{ secrets.STAGING_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.STAGING_GHCR_TOKEN }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"

          printf '%s' "${GHCR_TOKEN}" |
            ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -p "${SERVER_PORT}" \
              "${SERVER_USER}@${SERVER_HOST}" \
              "docker login ghcr.io \
                --username '${GHCR_USERNAME}' \
                --password-stdin"

      - name: Upload staging deployment files
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.STAGING_HOST }}
          SERVER_USER: ${{ secrets.STAGING_USER }}
          SERVER_PORT: ${{ vars.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ vars.STAGING_CLIENT_DEPLOY_PATH }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/nexera-group-client-staging}"

          scp \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -P "${SERVER_PORT}" \
            compose.staging.yml \
            scripts/deploy-staging.sh \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      - name: Deploy staging client
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.STAGING_HOST }}
          SERVER_USER: ${{ secrets.STAGING_USER }}
          SERVER_PORT: ${{ vars.STAGING_SSH_PORT }}
          DEPLOY_PATH: ${{ vars.STAGING_CLIENT_DEPLOY_PATH }}
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/nexera-group-client-staging}"

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "cd '${DEPLOY_PATH}' &&
             chmod +x deploy-staging.sh &&
             ./deploy-staging.sh '${IMAGE_NAME}' '${IMAGE_TAG}'"
