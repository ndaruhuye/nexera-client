<footer class="footer">
  <div class="footer__container">
    <section class="footer__section">
      <!-- Brand -->
      <div class="footer__brand">
        <a routerLink="/" class="footer__logo-link" aria-label="Go to homepage">
          <img
            [src]="logoUrl$ | async"
            alt="Nexera Group logo"
            class="footer__logo"
          />
        </a>

        <p class="footer__description">
          Software Engineering • DevOps • System Architecture
        </p>
      </div>

      <!-- Navigation -->
      <nav class="footer__nav" aria-label="Footer navigation">
        <a
          *ngFor="let route of routes; trackBy: trackByLabel"
          [routerLink]="route.route"
          routerLinkActive="footer__nav-link--active"
          [routerLinkActiveOptions]="{ exact: route.route === '/' }"
          class="footer__nav-link"
        >
          {{ route.label }}
        </a>
      </nav>

      <!-- Social -->
      <div class="footer__social" aria-label="Social links">
        <a
          *ngFor="let social of socials; trackBy: trackByLabel"
          [href]="social.link"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="social.label"
          class="footer__social-link"
        >
          <i [class]="social.icon" aria-hidden="true"></i>
        </a>
      </div>

      <!-- Contact -->
      <div class="footer__contact">
        <a
          *ngFor="let contact of contacts; trackBy: trackByLabel"
          [href]="contact.href"
          class="footer__contact-link"
        >
          <i [class]="contact.icon" aria-hidden="true"></i>
          <span>{{ contact.label }}</span>
        </a>
      </div>

      <!-- Bottom -->
      <div class="footer__bottom">
        <span>
          © {{ currentYear }} Nexera Group. All rights reserved.
        </span>

        <button
          type="button"
          class="footer__back-to-top"
          aria-label="Back to top"
          (click)="scrollToTop()"
        >
          <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
          <span>Back to top</span>
        </button>
      </div>
    </section>
  </div>
</footer>
