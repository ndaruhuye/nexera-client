name: nexera-group-client-production

services:
  client:
    # GitHub Actions builds this image and pushes it to GHCR.
    #
    # During deployment, IMAGE_TAG should normally be:
    # sha-<commit-hash>
    image: "${IMAGE_NAME:-ghcr.io/ndaruhuye/nexera-client}:${IMAGE_TAG:-latest}"

    pull_policy: always

    container_name: nexera-group-client

    # Only host-level Nginx can access this port.
    ports:
      - "127.0.0.1:8080:3000"

    environment:
      PORT: 3000
      NODE_ENV: production

    restart: unless-stopped

    init: true
